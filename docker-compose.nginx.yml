---
version: "2.1"

services:
  nginx:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: nginx
    restart: always
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
    environment:
      DB_SQLITE_FILE: "/data/database.sqlite"
      DISABLE_IPV6: 'true'
    volumes:
      - ${TES_APPDATA_PATH}/nginx_data:/data
      - ${TES_APPDATA_PATH}/nginx_letsencrypt:/etc/letsencrypt
