---
version: "2.1"

services:
  jellyfin:
    image: ghcr.io/linuxserver/jellyfin
    container_name: jellyfin
    restart: always
    ports:
      - 8096:8096 # UI
      - 7359:7359/udp #optional
      - 1900:1900/udp #optional
    environment:
      PUID: "${TES_UID}"
      PGID: "${TES_GID}"
      TZ: "${TES_TZ}"
    devices:
      - /dev/dri:/dev/dri  # vaapi encoding
      #  Devices for RaspberryPi
      #- /dev/vcsm:/dev/vcsm # RPi MMAL decoding
      #- /dev/vchiq:/dev/vchiq
      #- /dev/video10:/dev/video10 # RPi V4L2 encoding
      #- /dev/video11:/dev/video11 # RPi V4L2 encoding
      #- /dev/video12:/dev/video12 # RPi V4L2 encoding
    volumes:
      - "${TES_APPDATA_PATH}/jellyfin_config:/config"
      - "${TES_SHARES_PATH}/TV:/data/tvshows:ro"
      - "${TES_SHARES_PATH}/Movies:/data/movies:ro"
