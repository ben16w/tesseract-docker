version: "2.1"

services:
  wallabag:
    image: wallabag/wallabag
    container_name: wallabag
    restart: always
    ports:
      - 8076:80
    environment:
      SYMFONY__ENV__DOMAIN_NAME: https://wall.ben16w.site
      SYMFONY__ENV__SERVER_NAME: "Your wallabag instance"
    volumes:
      - ${TES_APPDATA_PATH}/wallabad_data:/var/www/wallabag/data 
      - ${TES_APPDATA_PATH}/wallabad_images:/var/www/wallabag/web/assets/images

