version: "2.1"

services:
  wallabag:
    image: wallabag/wallabag
    container_name: wallabag
    restart: always
    ports:
      - 8076:80
    environment:
      SYMFONY__ENV__DOMAIN_NAME: http://wall.ben16w.site
      SYMFONY__ENV__SERVER_NAME: "Your wallabag instance"
      SYMFONY__ENV__FOSUSER_CONFIRMATION: "false"

      SYMFONY__ENV__MAILER_HOST: ${TES_EMAIL_HOST}
      SYMFONY__ENV__MAILER_USER: ${TES_EMAIL_USERNAME}
      SYMFONY__ENV__MAILER_PASSWORD: "${TES_EMAIL_PASSORD}"
      SYMFONY__ENV__FROM_EMAIL: ${TES_EMAIL_USERNAME}

    volumes:
      - ${TES_APPDATA_PATH}/wallabag_data:/var/www/wallabag/data 
      - ${TES_APPDATA_PATH}/wallabag_images:/var/www/wallabag/web/assets/images

