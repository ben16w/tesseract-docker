---

version: "2.1"

services:
  nextcloud:
    image: nextcloud:22
    container_name: nextcloud
    restart: always
    user: ${TES_UID}:${TES_GID}
    depends_on:
      - nextcloud_db
    ports:
      - 8081:80
    environment:
      MYSQL_DATABASE: nextcloud_database
      MYSQL_USER: nextcloud_user
      MYSQL_PASSWORD: ${TES_SQL_PASSWORD}
      MYSQL_HOST: nextcloud_db:3306
      NEXTCLOUD_ADMIN_USER: ${TES_DOCKER_USERNAME}
      NEXTCLOUD_ADMIN_PASSWORD: ${TES_DOCKER_PASSWORD}
      NEXTCLOUD_DATA_DIR: /data
      NEXTCLOUD_TRUSTED_DOMAINS: ${TES_HOSTNAME} ${TES_DOMAIN}

      REDIS_HOST: nextcloud_broker # Name of Redis container (not set by default)
      REDIS_HOST_PORT: 6379

      SMTP_HOST: ${TES_EMAIL_HOST}
      SMTP_SECURE: ssl
      SMTP_PORT: ${TES_EMAIL_PORT}
      SMTP_AUTHTYPE: LOGIN
      SMTP_NAME: ${TES_EMAIL_USERNAME}
      SMTP_PASSWORD: ${TES_EMAIL_PASSORD}
      #MAIL_FROM_ADDRESS # Use this address for the 'from' field in the emails sent by Nextcloud. (not set by default)
      #MAIL_DOMAIN  # Set a different domain for the emails than the domain where Nextcloud is installed. (not set by default)

    volumes:
      - ${TES_APPDATA_PATH}/nextcloud_config:/var/www/html
      - ${TES_APPDATA_PATH}/nextcloud_redis/redis-session.ini:/usr/local/etc/php/conf.d/redis-session.ini
      - ${TES_SHARES_PATH}/Nextcloud:/data

    labels:
      - "com.centurylinklabs.watchtower.monitor-only=true"


  nextcloud_db:
    image: ghcr.io/linuxserver/mariadb
    container_name: nextcloud_db
    restart: always
    environment:
      PUID: ${TES_UID}
      PGID: ${TES_GID}
      TZ: ${TES_TZ}
      MYSQL_ROOT_PASSWORD: ${TES_SQL_PASSWORD}
      MYSQL_USER: nextcloud_user
      MYSQL_PASSWORD: ${TES_SQL_PASSWORD}
      MYSQL_DATABASE: nextcloud_database
    volumes:
      - ${TES_APPDATA_PATH}/nextcloud_db:/config

    labels:
      - com.centurylinklabs.watchtower.monitor-only=true

  nextcloud_broker:
    image: redis:alpine
    container_name: nextcloud_broker
    restart: always
