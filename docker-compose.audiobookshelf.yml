---
version: "2.1"

services:
  audiobookshelf:
    container_name: audiobookshelf
    image: ghcr.io/advplyr/audiobookshelf:latest
    environment:
      AUDIOBOOKSHELF_UID: ${TES_UID}
      AUDIOBOOKSHELF_GID: ${TES_UID}
    ports:
      - 13378:80
