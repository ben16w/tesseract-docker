---
version: "2.1"

# Default username:
# Default password: 

services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: always
    user: ${TES_UID}:${TES_GID}
    ports:
      - 8087:8087
    environment:
      # WEBSOCKET_ENABLED: "true" # Enable WebSocket notifications. Needs setup with reverse proxy.
      SIGNUPS_ALLOWED: "false"
      ROCKET_PORT: 8087
      ADMIN_TOKEN: "${TES_VAULTWARDEN_ADMIN_TOKEN}"
      #DOMAIN: <domain_name>
      #SMTP_HOST: <smtp_host>
      #SMTP_FROM: <sender_address>
      #SMTP_PORT: 587
      #SMTP_SSL: true
      #SMTP_USERNAME: <sender_username>
      #SMTP_PASSWORD: <sender_password>
      #ADMIN_TOKEN: <admin token>
    volumes:
      - ${TES_APPDATA_PATH}/vaultwarden_data:/data
